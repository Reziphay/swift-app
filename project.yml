name: Reziphay
options:
  bundleIdPrefix: com.reziphay
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_NSCameraUsageDescription: "Reziphay needs camera access to scan QR codes for reservation completion"
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Reziphay uses your location to show nearby services"
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Reziphay needs photo access to upload service and brand images"
    INFOPLIST_KEY_CFBundleDisplayName: "Reziphay"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Reziphay:
    type: application
    platform: iOS
    sources:
      - path: Reziphay
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reziphay.app
        PRODUCT_NAME: Reziphay
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
    info:
      path: Reziphay/Resources/Info.plist
      properties:
        CFBundleDisplayName: Reziphay
        UILaunchScreen: {}
        NSCameraUsageDescription: "Reziphay needs camera access to scan QR codes for reservation completion"
        NSLocationWhenInUseUsageDescription: "Reziphay uses your location to show nearby services"
        NSPhotoLibraryUsageDescription: "Reziphay needs photo access to upload service and brand images"
        ITSAppUsesNonExemptEncryption: false
